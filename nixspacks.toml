[phases.setup]
nixPkgs = ["php83", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.tokenizer", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.curl", "php83Extensions.zip", "composer"]

[phases.build]
cmds = ["composer install --no-dev", "php artisan config:cache", "php artisan route:cache"]

[start]
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"